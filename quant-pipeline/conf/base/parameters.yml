portfolio:
  target_volatility: 0.12
  risk_aversion: 4.0
  turnover_penalty: 0.0015
  expected_shortfall_limit: 0.035
  confidence_level: 0.975
  covariance_lookback: 120
  ewma_lambda: 0.94

assets:
  fx_pairs:
    - name: USDKRW
      base: USD
      quote: KRW
    - name: EURUSD
      base: EUR
      quote: USD
  equities:
    - SPY
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - AVGO
    - TSLA
    - JPM
  bonds:
    - US3M
    - US6M
    - US1Y
    - US2Y
    - US3Y
    - US5Y
    - US7Y
    - US10Y
    - US20Y
    - US30Y
  macro_series:
    - DXY
    - VIX
    - WTI
    - DFF
    - SOFR

timesfm:
  enabled: true
  horizon: 63
  context_length: 252

backtest:
  lookback: 252
  horizons: [5, 20, 60]
  step: 5
  min_signal_threshold: 0.01
  max_annual_drift: 0.35

short_term:
  lookback: 504
  horizons: [1, 7]
  step: 1
  max_expected_move: 0.025
  train_window: 252
  ridge_alpha: 12.0

scheduler:
  enabled: true
  refresh_interval_minutes: 15
